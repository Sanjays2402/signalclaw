name: ci
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  lint:
    if: ${{ vars.ENABLE_CI == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install ruff==0.15.11
      - run: ruff check .
  security-audit:
    if: ${{ vars.ENABLE_CI == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true  # advisories should warn, not block, until triaged
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install pip-audit
      - run: pip install -e .
      - run: pip-audit --strict --ignore-vuln GHSA-4xh5-x5gv-qwph
  test:
    if: ${{ vars.ENABLE_CI == 'true' }}
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - run: pip install -e .
      - run: pip install ruff==0.15.11
      - run: pytest -q
  web:
    if: ${{ vars.ENABLE_CI == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: "22" }
      - run: cd web && npm ci && npm run build
  helm:
    # Render and validate the production Helm chart on every PR so the
    # hardening invariants documented in README "Operations" (resource
    # limits, non-root pod security, dropped caps, RO root FS, probes,
    # HPA/PDB/NetworkPolicy toggles, Sentry env wiring) are actually
    # gated, not silently skipped because the test runner had no helm
    # binary on PATH.
    if: ${{ vars.ENABLE_CI == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.2
      - name: Helm lint
        run: helm lint infra/helm/signalclaw
      - name: Helm template (default values)
        run: helm template t infra/helm/signalclaw > /dev/null
      - name: Install test deps
        run: pip install pytest pyyaml
      - name: Run helm chart tests
        run: pytest -q tests/test_helm_chart.py tests/test_helm_chart_ci.py
