apiVersion: v1
kind: Service
metadata: { name: {{ .Release.Name }}-api }
spec:
  type: {{ .Values.service.type }}
  selector: { app: {{ .Release.Name }}-api }
  ports: [{ port: {{ .Values.api.port }}, targetPort: {{ .Values.api.port }} }]
---
apiVersion: v1
kind: Service
metadata: { name: {{ .Release.Name }}-web }
spec:
  type: {{ .Values.service.type }}
  selector: { app: {{ .Release.Name }}-web }
  ports: [{ port: {{ .Values.web.port }}, targetPort: {{ .Values.web.port }} }]
