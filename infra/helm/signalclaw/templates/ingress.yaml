{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: { name: {{ .Release.Name }}-ing }
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: { service: { name: {{ .Release.Name }}-api, port: { number: {{ .Values.api.port }} } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: {{ .Release.Name }}-web, port: { number: {{ .Values.web.port }} } } }
{{- end }}
